data:
  raw_path: "data/raw/default of credit card clients.xls"
  processed_path: "data/processed/clean.csv"
  target_column: "default payment next month"
  test_size: 0.2
  random_state: 42

model:
  algorithm: "random_forest"
  n_estimators: 100
  max_depth: 10
  class_weight: "balanced"

evaluation:
  primary_metric: "roc_auc"
  threshold: 0.5
