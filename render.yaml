services:
  - type: web
    name: credit-risk-scoring
    env: python
    buildCommand: pip install -r requirements-prod.txt
    startCommand: gunicorn api.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.13.0
